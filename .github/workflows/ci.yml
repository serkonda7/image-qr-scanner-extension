name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ['*']

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run check
      - run: bun run lint:ci
